<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Monitor - Rețea Socială</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
    --bg-color: #050505;
    --panel-bg: #0d0d0f;
    --text-color: #e2e2e2;
    --text-muted: #71717a;
    --primary: #ffffff;
    --secondary: #00f2ff;
    --error: #ff0055;
    --border: #1a1a1e;
    --glow: 0 0 15px rgba(0, 242, 255, 0.3);
    --header-h: 60px;
    --success: #00ffaa;
    --warning: #f59e0b;
    --pink: #ec4899;
}

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body::after {
            content: " ";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.15;
        }

        .main-header {
            background: rgba(5, 5, 5, 0.95);
            border-bottom: 1px solid var(--border);
            padding: 8px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: 'Outfit', sans-serif;
            flex-shrink: 0;
        }

        .toolbar-header {
            height: var(--header-h);
            background: rgba(13, 13, 15, 0.8);
            backdrop-filter: blur(12px);
            padding: 0 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            z-index: 100;
            flex-shrink: 0;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .controls button, 
        .channel-input-group button {
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            font-size: 0.7rem;
            background: transparent;
            color: var(--text-color);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            white-space: nowrap;
            min-width: 0;
        }

        .controls button:hover:not(:disabled),
        .channel-input-group button:hover:not(:disabled) {
            background: #1a1a1e;
            border-color: var(--secondary);
            box-shadow: var(--glow);
            transform: translateY(-1px);
        }

        .controls button:active,
        .channel-input-group button:active {
            transform: scale(0.96);
        }

        #btn-start {
            background: #fff;
            color: #000;
            border: none;
        }

        #btn-start:hover {
            background: var(--secondary);
            color: #000;
        }

        #btn-stop {
            color: var(--error);
            border-color: rgba(255, 0, 85, 0.2);
        }

        #btn-stop:hover {
            background: rgba(255, 0, 85, 0.1);
            border-color: var(--error);
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.3);
        }

        #btn-reset {
            border-color: #333;
        }

        #btn-reset:hover {
            border-color: #aaa;
            color: #fff;
        }

        #btn-export {
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--border);
        }

        #btn-export:hover {
            background: #1a1a1e;
            border-color: var(--secondary);
            box-shadow: var(--glow);
        }

        .project-dropdown {
            position: relative;
            display: inline-block;
        }

        #btn-project {
            min-width: 0;
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--border);
        }

        #btn-project:hover {
            background: #1a1a1e;
            border-color: var(--secondary);
            box-shadow: var(--glow);
        }

        #project-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-top: 5px;
            min-width: 260px;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            animation: fadeIn 0.2s ease-out;
        }

        #project-menu.show {
            display: block;
        }

        .project-menu-header {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        .project-menu-header input {
            width: 100%;
            padding: 6px;
            margin-bottom: 8px;
            background: #000;
            border: 1px solid var(--border);
            color: #fff;
            border-radius: 4px;
            font-size: 0.7rem;
        }

        .project-menu-header button {
            width: 100%;
            margin-bottom: 4px;
            justify-content: center;
            padding: 6px 8px;
            font-size: 0.7rem;
        }

        #projects-list {
            max-height: 250px;
            overflow-y: auto;
            padding: 5px;
        }

        .project-item {
            padding: 8px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .project-item:hover {
            background: #1a1a1e;
        }

        .project-item-info {
            flex: 1;
        }

        .project-item-name {
            font-weight: bold;
            font-size: 0.75rem;
        }

        .project-item-date {
            font-size: 0.6rem;
            color: var(--text-muted);
        }

        .project-item-delete {
            background: transparent;
            border: none;
            color: var(--error);
            cursor: pointer;
            padding: 4px;
            font-size: 1rem;
        }

        .project-item-delete:hover {
            color: #ff3377;
        }

        #btn-add-channel {
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--border);
            padding: 6px 10px;
            font-weight: 500;
        }

        #btn-add-channel:hover {
            background: #1a1a1e;
            border-color: var(--secondary);
            box-shadow: var(--glow);
            transform: translateY(-1px);
        }

        #btn-upload {
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--border);
            padding: 6px 10px;
        }

        #btn-upload:hover {
            background: #1a1a1e;
            border-color: var(--success);
            box-shadow: 0 0 15px rgba(0, 255, 170, 0.3);
        }

        .channel-input-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        input {
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: #000;
            color: #fff;
            outline: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            width: 180px;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--secondary);
            box-shadow: var(--glow);
        }

        /* ─── FIX PRINCIPAL: main-wrapper cu scroll ─── */
        .main-wrapper {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            min-height: 0; /* important pentru flex child cu scroll */
        }

        /* ─── LAYOUT: main-container — sidebar dictează înălțimea ─── */
        .main-container {
            display: flex;
            align-items: flex-start; /* sidebar se dimensionează după conținut */
        }

        .left-panel {
            width: 20%;
            background: var(--panel-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
            /* înălțimea e dictată strict de conținut — fără min-height */
        }

        h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .mode-selector {
            display: flex;
            background: #000;
            border-radius: 10px;
            padding: 4px;
            gap: 4px;
            border: 1px solid var(--border);
        }

        .mode-item {
            flex: 1;
            padding: 8px 5px;
            font-size: 0.7rem;
            text-align: center;
            cursor: pointer;
            border-radius: 7px;
            transition: all 0.2s;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 600;
        }

        .mode-item.active {
            background: var(--secondary);
            color: #000;
            box-shadow: var(--glow);
        }

        .channel-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: #141416;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .channel-item:hover {
            border-color: #333;
            background: #1a1a1e;
        }

        .channel-name {
            font-size: 0.85rem;
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            margin-right: 10px;
        }

        .channel-name.target-active {
            color: var(--secondary);
            font-weight: bold;
        }

        .btn-target {
            padding: 4px;
            border-radius: 4px;
            width: 24px;
            height: 24px;
            font-size: 0.8rem;
            background: transparent;
            border: 1px solid #333;
            color: #fff;
            cursor: pointer;
        }

        .btn-target.active {
            background: var(--secondary);
            color: #000;
        }

        .btn-remove {
            padding: 4px;
            color: var(--error);
            border-color: transparent;
            background: transparent;
            border: 1px solid #333;
            cursor: pointer;
        }

        .posts-list {
            flex: 0 0 auto;
            max-height: 160px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            background: #0a0a0c;
        }

        .post-match {
            padding: 15px;
            background: #141416;
            border-radius: 10px;
            margin-bottom: 12px;
            border-left: 3px solid var(--secondary);
            font-size: 0.85rem;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .score {
            color: var(--secondary);
            font-weight: bold;
            font-family: 'JetBrains Mono', monospace;
        }

        .sentiment-badge {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: bold;
        }

        .sentiment-badge.positive {
            background: rgba(0, 255, 170, 0.15);
            color: #00ffaa;
            border: 1px solid rgba(0, 255, 170, 0.3);
        }

        .sentiment-badge.negative {
            background: rgba(255, 0, 85, 0.15);
            color: #ff0055;
            border: 1px solid rgba(255, 0, 85, 0.3);
        }

        .sentiment-badge.neutral {
            background: rgba(255, 255, 255, 0.05);
            color: #999;
        }

        .entity-box {
            background: #0a0a0c;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
        }

        .tabs-header {
            display: flex;
            gap: 15px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 15px;
        }

        .tab-item {
            padding: 8px 5px;
            font-size: 0.75rem;
            cursor: pointer;
            color: var(--text-muted);
            position: relative;
            font-weight: 600;
            text-transform: uppercase;
        }

        .tab-item.active {
            color: var(--secondary);
        }

        .tab-item.active::after {
            content: "";
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--secondary);
            box-shadow: var(--glow);
        }

        /* ─── right-panel: sticky la top, înălțime = sidebar ─── */
        .right-panel {
            width: 80%;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            align-self: flex-start; /* nu se întinde peste sidebar */
        }

        /* ─── graph-container: înălțime fixată prin JS după render ─── */
        .graph-container {
            position: relative;
            min-height: 400px; /* BUG 2+6 FIX: fallback dacă JS/ResizeObserver nu a rulat încă */
        }

        /* ─── graful umple 100% din graph-container ─── */
        #network-graph {
            width: 100%;
            height: 100%;
            min-height: 400px; /* BUG 6 FIX: vis.Network nu poate inițializa pe 0px */
            background: radial-gradient(circle at center, #111 0%, #050505 100%);
        }

        .status-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 8px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid var(--border);
            z-index: 10;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #444;
        }

        .status-dot.active {
            background: var(--secondary);
            box-shadow: 0 0 10px var(--secondary);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .graph-controls {
            position: absolute;
            top: 20px;
            right: 20p
